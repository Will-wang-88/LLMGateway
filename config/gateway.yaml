# LLM Gateway sample configuration.
# Copy this file, edit the backends/api_keys sections, and start the gateway:
#   LLMGATEWAY_CONFIG=config/gateway.yaml ./llmgateway
#
# Everything Gateway-specific lives in this file. Backend APIs must be
# OpenAI-compatible (e.g. vLLM, SGLang, TGI, Ollama, llama.cpp server).

server:
  host: 0.0.0.0
  port: 8080
  request_body_limit_mb: 50
  default_timeout_ms: 120000
  stream_idle_timeout_ms: 30000
  read_header_timeout_ms: 30000
  shutdown_timeout_ms: 30000
  # Peers (CIDR or exact IP) whose X-Forwarded-For / X-Real-IP headers
  # the gateway is willing to honor when resolving the client IP. Leave
  # empty if the gateway is exposed directly; otherwise list your LB /
  # ingress / mesh ranges. Spoofed headers from non-trusted peers are
  # ignored.
  trusted_proxies: []

auth:
  api_key_header: Authorization
  api_key_prefix: "Bearer "
  hash_algorithm: hmac_sha256
  # In production, set LLMGATEWAY_HASH_SECRET env var instead.
  hash_secret: "change-me-in-production"

routing:
  default_policy: weighted_round_robin
  model_alias_enabled: true
  # Gateway is a transparent proxy: unknown JSON fields are forwarded as-is.
  unknown_field_policy: passthrough
  # When false (default), backends in the "degraded" state (e.g. health
  # probe returned 4xx) are skipped during routing. Set to true only if
  # you want degraded backends to keep receiving real traffic.
  allow_degraded_backends: false

health_check:
  interval_ms: 5000
  timeout_ms: 2000
  failure_threshold: 3
  success_threshold: 2
  path: /models

rate_limit:
  # memory: process-local. NOT safe for replicaCount > 1.
  # redis: shared state across replicas. Required for multi-replica HA.
  backend: memory
  default_requests_per_minute: 600
  default_concurrent_requests: 20
  # redis_url: required when backend=redis. Format:
  #   redis://[user:password@]host:port/db
  redis_url: ""
  redis_prefix: llmgw

logging:
  level: info
  default_log_metadata: true
  default_log_input: false
  default_log_output: false
  default_log_raw_request: false
  default_log_raw_response: false
  default_log_stream_chunks: false

metrics:
  prometheus_enabled: true
  prometheus_path: /metrics

admin:
  enabled: true
  # Either set bind_token here, or set LLMGATEWAY_ADMIN_TOKEN env var.
  bind_token: "change-me-admin-token"

# Persistent storage for request_logs and audit_logs.
# Driver "memory" (default) keeps the last 50k records in process.
# Driver "sqlite" persists to a local file (pure-Go, no CGO).
storage:
  # memory: in-process ring buffer, lost on restart.
  # sqlite: local file, single-node only.
  # postgres: shared store, required for multi-replica HA.
  #   DSN format: postgres://user:pass@host:5432/dbname?sslmode=disable
  #   (or set LLMGATEWAY_PG_DSN to override at runtime).
  driver: sqlite
  dsn: data/llmgateway.db
  log_retention_days: 30

# Optional per-model queue with backpressure. When disabled (default) requests
# are routed immediately.
queue:
  enabled: false
  max_queue_size: 1000
  queue_timeout_ms: 30000
  per_model_limit: 64

# Optional OTLP/HTTP tracing.
tracing:
  enabled: false
  endpoint: http://otel-collector:4318
  service_name: llmgateway
  sample_ratio: 1.0

# Web dashboard at /ui/.
dashboard:
  enabled: true

# Notifications when a backend changes status. Disabled by default.
# Supply the SMTP password via the LLMGATEWAY_SMTP_PASSWORD env var
# (SMTP_PASSWORD is also accepted) so the YAML never contains plaintext
# credentials. The env value overrides the inline `password` field below.
notifications:
  email:
    enabled: false
    smtp_host: smtp.example.com
    smtp_port: 587
    username: alerts@example.com
    password: ""
    from: llmgateway@example.com
    to: []
    use_tls: false
    start_tls: true
    cooldown_ms: 300000
    notify_on:
      - backend_degraded
      - backend_unhealthy
      - backend_recovered

# Multi-user RBAC. Roles: super_admin, admin, operator, viewer, auditor.
# Passwords are SHA-256 hashed at load time. For production, prefer
# password_hash (pre-computed) over inline password so the config file
# never carries plaintext.
admin_users:
  - username: alice
    # password_hash is SHA-256 hex of the plaintext.
    password_hash: ""
    email: alice@example.com
    role: super_admin

backends:
  - id: gpu-01
    name: GPU Node 01 (vLLM)
    base_url: http://localhost:8000/v1
    enabled: true
    models:
      - llama-3.1-70b
      - llama-3.1-8b
    weight: 2
    max_concurrent_requests: 32
    timeout_ms: 120000
    stream_idle_timeout_ms: 30000
    tags: [gpu, h100, zone-a]

  - id: gpu-02
    name: GPU Node 02 (vLLM)
    base_url: http://localhost:8001/v1
    enabled: true
    models:
      - llama-3.1-70b
      - qwen-72b
    weight: 1
    max_concurrent_requests: 32
    timeout_ms: 120000
    stream_idle_timeout_ms: 30000
    tags: [gpu, h100, zone-b]

  - id: gpu-03
    name: GPU Node 03 (SGLang reasoning)
    base_url: http://localhost:8002/v1
    enabled: true
    models:
      - deepseek-r1
      - qwen-thinking
    weight: 1
    max_concurrent_requests: 16
    timeout_ms: 300000
    stream_idle_timeout_ms: 60000
    tags: [gpu, reasoning]

  # --- Fugu-style orchestration worker pool (self-hosted) ---
  - id: gpu-fugu-gptoss
    name: gpt-oss-120b (vLLM, MoE, TP=4)
    base_url: http://localhost:8010/v1
    enabled: true
    models:
      - gpt-oss-120b
    weight: 1
    max_concurrent_requests: 8
    timeout_ms: 300000
    stream_idle_timeout_ms: 60000
    tags: [gpu, h200, moe, reasoning]
  - id: gpu-fugu-gemma
    name: Gemma 4 26B (SGLang, TP=2, low latency)
    base_url: http://localhost:8011/v1
    enabled: true
    models:
      - gemma-4-26b
    weight: 1
    max_concurrent_requests: 32
    timeout_ms: 120000
    stream_idle_timeout_ms: 30000
    tags: [gpu, dense, general]
  - id: gpu-fugu-qwen
    name: Qwen3.6 27B (vLLM, TP=2, prefix caching)
    base_url: http://localhost:8012/v1
    enabled: true
    models:
      - qwen3.6-27b
    weight: 1
    max_concurrent_requests: 24
    timeout_ms: 180000
    stream_idle_timeout_ms: 45000
    tags: [gpu, dense, coding, zh]

# Input-token compression. Deterministically rewrites large, uniform tool-result
# payloads (arrays of objects) into a compact CSV-schema before forwarding, and
# — only when still over the token budget — drops low-value rows behind a
# retrievable <<ccr:HASH>> marker (fetch via GET /v1/retrieve/{hash}).
#
# This block is the GLOBAL DEFAULT. It is overlaid by a per-model `compression:`
# block, which is in turn overlaid by a per-API-key `compression:` block (each
# field inherits from the layer below when unset). Disabled unless enabled here
# or at a lower layer. min_input_tokens is the gate: compression runs only when
# the estimated input (~bytes/4) exceeds it.
compression:
  enabled: false          # global on/off; set true to enable fleet-wide
  min_input_tokens: 4000  # only compress requests larger than this
  lossless_only: false    # true => never drop rows / emit markers
  # token_budget: 0       # absolute lossy budget; defaults to the model context_length

models:
  - name: llama-3.1-70b
    type: chat
    enabled: true
    context_length: 131072
    capability_mode: passthrough
    routing_policy: weighted_round_robin
    # Per-model override: enable compression for this model above 8k input tokens.
    compression:
      enabled: true
      min_input_tokens: 8000
  - name: llama-3.1-8b
    type: chat
    enabled: true
    context_length: 131072
    capability_mode: passthrough
  - name: qwen-72b
    type: chat
    enabled: true
    capability_mode: passthrough
  - name: deepseek-r1
    type: chat
    enabled: true
    capability_mode: passthrough
  - name: qwen-thinking
    type: chat
    enabled: true
    capability_mode: passthrough
  # Fugu worker models (direct access still possible; orchestration
  # virtual models below fan out across them).
  - name: gpt-oss-120b
    type: chat
    enabled: true
    context_length: 131072
    capability_mode: passthrough
  - name: gemma-4-26b
    type: chat
    enabled: true
    context_length: 131072
    capability_mode: passthrough
  - name: qwen3.6-27b
    type: chat
    enabled: true
    context_length: 131072
    capability_mode: passthrough

model_aliases:
  - alias: company-main-model
    internal_model: llama-3.1-70b
    forwarding_mode: use_internal
    enabled: true
  - alias: reasoning-main
    internal_model: deepseek-r1
    forwarding_mode: use_internal
    enabled: true

api_keys:
  - id: key-team-a
    name: Team A Production Key
    # Plaintext value - shown once. On startup it is hashed and the
    # plaintext is dropped. Rotate via the admin API.
    key: "sk-prod-team-a-CHANGE-ME"
    enabled: true
    allowed_models:
      - "llama-*"
      - qwen-72b
      - deepseek-r1
      - company-main-model
      - reasoning-main
    denied_models: []
    # Optional per-key client IP allow / deny. Deny takes precedence over
    # allow. Empty allowed_client_ips means "no IP restriction". Supports
    # exact IPv4/IPv6 and CIDR.
    allowed_client_ips: []
    denied_client_ips: []
    rate_limit:
      enabled: true
      requests_per_minute: 600
      tokens_per_minute: 1000000
      concurrent_requests: 20
    quota:
      daily_requests: 100000
      daily_tokens: 100000000
      monthly_requests: 3000000
      monthly_tokens: 1000000000
    delay_ms: 0
    logging:
      log_metadata: true
      log_input: false
      log_output: false
      log_raw_request: false
      log_raw_response: false
      log_stream_chunks: false

  - id: key-trial
    name: Trial Tier
    key: "sk-trial-CHANGE-ME"
    enabled: true
    allowed_models:
      - llama-3.1-8b
    rate_limit:
      enabled: true
      requests_per_minute: 30
      concurrent_requests: 2
    delay_ms: 500

# --- Fugu-style model orchestration (behaviour-level fusion) ---
# Exposes single OpenAI-compatible virtual models that route/decompose a
# request across the self-hosted worker pool. No model weights are merged;
# each worker is treated as a black box.
orchestration:
  enabled: false            # set true to activate the virtual models below
  router_model: fugu-auto   # Tier-A: low-latency, single best worker
  conductor_model: fugu-ultra  # Tier-B: ≤5-step Thinker/Worker/Verifier DAG
  # When the Tier-A classifier's confidence is below this, the request is
  # escalated to Tier-B (or, if no conductor, to the strongest worker).
  confidence_threshold: 0.55
  max_steps: 5              # hard upper bound on Tier-B worker calls
  # effective_score = strength - cost_penalty * cost. 0 disables cost bias.
  cost_penalty: 0.0
  request_timeout_ms: 120000
  # Inbound header carrying request data sensitivity. Workers whose
  # secret_max_level is below the request level are excluded (access list /
  # data governance). 0 = unlimited (on-prem).
  secret_level_header: X-Secret-Level
  workers:
    - id: qwen
      model: qwen3.6-27b
      tasks: [code, zh, verify]   # strong at coding, tool use, 繁中
      strength: 0.82
      cost: 2
      secret_max_level: 0         # self-hosted: any sensitivity
      tags: [coding, tool_use, zh-tw]
    - id: gptoss
      model: gpt-oss-120b
      tasks: [reasoning, verify]  # MoE capacity, deep reasoning / math
      strength: 0.90
      cost: 5
      secret_max_level: 0
      tags: [reasoning, math, long_context]
    - id: gemma
      model: gemma-4-26b
      tasks: [general]            # general chat / summarization / multilingual
      strength: 0.70
      cost: 1
      secret_max_level: 0
      tags: [general, multilingual, summarization]
