apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llmgateway.fullname" . }}
  labels:
    {{- include "llmgateway.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "llmgateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llmgateway.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ .Values.config | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: gateway
          image: {{ include "llmgateway.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - "--config"
            - "/etc/llmgateway/gateway.yaml"
          env:
            {{- if .Values.existingSecret }}
            - name: LLMGATEWAY_HASH_SECRET
              valueFrom: { secretKeyRef: { name: {{ .Values.existingSecret }}, key: hashSecret } }
            - name: LLMGATEWAY_ADMIN_TOKEN
              valueFrom: { secretKeyRef: { name: {{ .Values.existingSecret }}, key: adminToken } }
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/llmgateway
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "llmgateway.fullname" . }}-config
        - name: tmp
          emptyDir: {}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "llmgateway.fullname" . }}-data
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
